<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="A configurable personal habit tracker" />

    <!-- PWA: installs as standalone app on iOS and Android -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Habits" />
    <meta name="theme-color" content="#2d2a2e" />

    <link rel="manifest" href="/habit-tracker/manifest.json" />
    <link rel="apple-touch-icon" href="/habit-tracker/apple-touch-icon.png" />

    <title>Habit Tracker</title>
    <style>
      /* Reset and base styles so the Monokai dark theme fills the viewport */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { height: 100%; background: #2d2a2e; }
      #root { height: 100%; }
      input[type="number"]::-webkit-inner-spin-button,
      input[type="number"]::-webkit-outer-spin-button { opacity: 1; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      /* Register service worker for offline support. */
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/habit-tracker/sw.js');
        });
      }
    </script>
  </body>
</html>
